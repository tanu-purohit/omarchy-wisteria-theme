$inner_color = rgba(0, 0, 0, 0)
$outer_color = rgba(0, 0, 0, 0)
$font_color = rgba(0, 0, 0, 0)
$check_color = rgba(0, 0, 0, 0)

$bg_color = rgba(f0edf8ff)
$text_color = rgb(45, 31, 78)
$muted_color = rgb(176, 138, 224)
$accent_color = rgb(155, 114, 207)
$error_color = rgb(192, 99, 122)
$input_bg = rgba(232, 226, 245, 0.85)
$shadow_color = rgba(155, 114, 207, 0.2)

general {
    disable_loading_bar = true
    grace = 2
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
}

background {
    monitor =
    color = $bg_color
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $text_color
    font_size = 110
    font_family = Cantarell Thin
    shadow_passes = 0
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %B %d")"
    color = rgb(107, 79, 160)
    font_size = 24
    font_family = Cantarell Light
    shadow_passes = 0
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = hi $USER
    font_size = 20
    font_family = Cantarell Light
    color = rgb(155, 114, 207)
    position = 0, -80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 48
    outline_thickness = 2
    dots_size = 0.35
    dots_spacing = 0.25
    dots_center = true
    dots_rounding = -1
    outer_color = $accent_color
    inner_color = $input_bg
    font_color = $text_color
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##b08ae0"><i>password</i></span>
    hide_input = false
    rounding = 12
    check_color = $accent_color
    fail_color = $error_color
    fail_text = <i>wrong password 🦋</i>
    fail_timeout = 2000
    fail_transition = 300
    swap_font_color = false
    position = 0, -150
    halign = center
    valign = center
}
